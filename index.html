<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>MIS GASTOS V0.7 - GOLD FINAL</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230b0f1a'/><circle cx='50' cy='50' r='40' fill='none' stroke='%23d4af37' stroke-width='4'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' font-family='serif' font-weight='bold' font-size='35' fill='%23d4af37'>O%26J</text></svg>">
    <style>
        :root { --primary: #d4af37; --success: #22c55e; --danger: #ef4444; --warning: #f97316; --electric-blue: #00f2ff; --bg: #0b0f1a; --card-bg: rgba(30, 41, 59, 0.7); --text: #f8fafc; --gold-gradient: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); --pink-metal: linear-gradient(45deg, #a00050, #ff1493, #ff85c1, #ff1493, #a00050); --gold-metal: linear-gradient(45deg, #8a6d3b, #d4af37, #fcf6ba, #d4af37, #8a6d3b); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .background-icon { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 30vw; font-weight: 900; background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; opacity: 0.1; z-index: -1; pointer-events: none; }
        .topbar { background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(10px); padding: 20px; font-size: 15px; font-weight: 700; text-align: center; border-bottom: 1px solid var(--primary); color: var(--primary); position: sticky; top: 0; z-index: 1000; }
        .container { padding: 20px; position: relative; z-index: 1; }
        .card { background: var(--card-bg); padding: 16px; margin: 12px 0; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); position: relative; border-left: 5px solid var(--primary); backdrop-filter: blur(8px); }
        .card b { font-size: 14px; color: #fff; display: block; }
        .card .meta { font-size: 11px; color: var(--primary); font-weight: bold; margin-bottom: 4px; }
        .card .monto { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); font-size: 16px; font-weight: 800; }
        .filtros-wrapper { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; background: var(--card-bg); padding: 12px; border-radius: 20px; border: 1px solid rgba(212, 175, 55, 0.3); margin-bottom: 20px; }
        .filtros-wrapper .filtro-item:nth-child(n+4) { grid-column: span 1.5; }
        .filtros-wrapper .filtro-item:nth-child(4) { grid-column: 1 / 2; }
        .filtros-wrapper .filtro-item:nth-child(5) { grid-column: 2 / 4; }
        .footer-controles { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(15px); padding: 15px 20px 35px 20px; box-sizing: border-box; border-top: 2px solid var(--primary); z-index: 1100; border-radius: 24px 24px 0 0; }
        .footer-row { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; width: 100%; }
        .plus { background: var(--gold-gradient); width: 65px; height: 65px; border-radius: 50%; font-size: 35px; color: #000; display: flex; align-items: center; justify-content: center; border: none; font-weight: bold; cursor: pointer; }
        #balance { font-size: 24px; font-weight: 900; padding: 10px 15px; background: #000; border-radius: 14px; border: 1px solid var(--primary); text-align: center; justify-self: end; min-width: 110px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; font-size: 13px; border-radius: 12px; border: 1px solid #334155; background: rgba(15, 23, 42, 0.9); color: white; box-sizing: border-box; }
        #form input, #form select, #form textarea { font-size: 22px !important; height: auto !important; padding: 14px !important; }
        .btn-small { padding: 10px; flex: 1; font-size: 10px; background: #222; color: var(--primary); border-radius: 8px; border: 1px solid var(--primary); font-weight: bold; }
        .hidden { display: none !important; }
        .popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 9999; backdrop-filter: blur(15px); }
        .popup-content { background: #1e293b; padding: 25px; border-radius: 24px; text-align: center; width: 85%; max-width: 320px; border: 2px solid var(--primary); }
        .pin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .btn-pin { background: rgba(255,255,255,0.05); border: 1px solid var(--primary); color: white; padding: 15px; border-radius: 12px; font-size: 20px; font-weight: bold; }
        .pin-dots { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--primary); }
        .dot.filled { background: var(--primary); }
        .spinner { width: 30px; height: 30px; border: 3px solid rgba(212,175,55,0.1); border-left-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }

/* Fuerza el grid a 6 columnas invisibles para permitir una división exacta al 50% */
.filtros-wrapper {
    display: grid !important;
    grid-template-columns: repeat(6, 1fr) !important;
    gap: 8px !important;
}

/* Fila Superior: Cada filtro ocupa 2 columnas (AÑO, MES, ORI) */
.filtros-wrapper .filtro-item:nth-child(1),
.filtros-wrapper .filtro-item:nth-child(2),
.filtros-wrapper .filtro-item:nth-child(3) {
    grid-column: span 2 !important;
}

/* Fila Inferior: Cada filtro ocupa 3 columnas (Simetría 50/50 perfecta) */
/* CAT: Alineado al inicio (AÑO) y termina en el centro exacto */
.filtros-wrapper .filtro-item:nth-child(4) {
    grid-column: span 3 !important;
    display: flex !important;
    flex-direction: column !important;
}

/* SUBCAT: Empieza en el centro y termina al final (ORI) */
.filtros-wrapper .filtro-item:nth-child(5) {
    grid-column: span 3 !important;
    display: flex !important;
    flex-direction: column !important;
}

/* Asegura que los selectores ocupen todo su nuevo espacio simétrico */
.filtros-wrapper .filtro-item select {
    width: 100% !important;
    margin-top: 4px !important;
}


    </style>
</head>
<body>
<div id="authOverlay" class="popup-overlay">
    <div class="popup-content">
        <h2 style="color:var(--primary); margin-bottom:10px;">ACCESO GOLD</h2>
        <div class="pin-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        <div class="pin-grid">
            <button class="btn-pin" onclick="pressPin(1)">1</button><button class="btn-pin" onclick="pressPin(2)">2</button><button class="btn-pin" onclick="pressPin(3)">3</button>
            <button class="btn-pin" onclick="pressPin(4)">4</button><button class="btn-pin" onclick="pressPin(5)">5</button><button class="btn-pin" onclick="pressPin(6)">6</button>
            <button class="btn-pin" onclick="pressPin(7)">7</button><button class="btn-pin" onclick="pressPin(8)">8</button><button class="btn-pin" onclick="pressPin(9)">9</button>
            <button class="btn-pin" onclick="biometricAuth()" style="color:var(--electric-blue)">🧬</button>
            <button class="btn-pin" onclick="pressPin(0)">0</button>
            <button class="btn-pin" onclick="clearPin()" style="color:var(--danger)">✖</button>
        </div>
    </div>
</div>
<div class="background-icon">O&J</div>
<div id="movimientos" class="hidden">
    <div class="topbar">MIS GASTOS • GOLD V0.6.1 <span id="tagBackup">APK CLOUD</span></div>
    <div class="container">
        <div class="filtros-wrapper">
            <div class="filtro-item"><span style="font-size:9px;color:var(--primary)">AÑO</span><select id="filtroAño" onchange="resetPagina(); mostrar()"></select></div>
            <div class="filtro-item"><span style="font-size:9px;color:var(--primary)">MES</span><select id="filtroMes" onchange="resetPagina(); mostrar()"></select></div>
            <div class="filtro-item"><span style="font-size:9px;color:var(--primary)">ORI</span><select id="filtroOri" onchange="resetPagina(); mostrar()"></select></div>
            <div class="filtro-item"><span style="font-size:9px;color:var(--primary)">CAT</span><select id="filtroCat" onchange="resetPagina(); mostrar()"></select></div>
            <div class="filtro-item"><span style="font-size:9px;color:var(--primary)">SUBCAT</span><select id="filtroSub" onchange="resetPagina(); mostrar()"></select></div>
        </div>
        <div id="lista"></div>
        <div id="loader" style="display:none;"><div class="spinner"></div></div>
        <div style="height:250px"></div>
    </div>
    <div class="footer-controles">
        <div style="display:flex; gap:8px; margin-bottom: 20px;">
            <button class="btn-small" onclick="exportarCSV()">📊 EXPORTAR</button>
            <button class="btn-small" onclick="document.getElementById('inputFile').click()">📥 IMPORTAR</button>
            <button class="btn-small" onclick="resetTotal()" style="background:#450a0a; color:var(--danger); border-color:var(--danger); flex:0.4;">⚠️ RESET</button>
            <input type="file" id="inputFile" class="hidden" onchange="importarCSV(event)">
        </div>
        <div class="footer-row"><div></div><button class="plus" onclick="abrirFormulario()">+</button><div id="balance">0.00 €</div></div>
    </div>
</div>
<div id="form" class="hidden">
    <div class="topbar" id="tituloForm">NUEVO REGISTRO</div>
    <div class="container">
        <div style="display:flex; gap:8px; margin-bottom: 8px;"><select id="origen"></select><input type="date" id="fecha" style="width:45%;" onclick="this.showPicker()"></div>
        <input type="hidden" id="editId">
        <div style="display:flex; gap:8px; align-items:center;"><select id="categoria"></select><button onclick="borrarElemento('categoria')" style="width:70px; height:68px; border-radius:16px; background:var(--danger); border:none; color:white; font-size:24px;">🗑</button></div>
        <div style="display:flex; gap:8px; align-items:center; margin-top:8px;"><select id="subcategoria"></select><button onclick="borrarElemento('subcategoria')" style="width:70px; height:68px; border-radius:16px; background:var(--danger); border:none; color:white; font-size:24px;">🗑</button></div>
        <input id="importe" type="number" step="0.01" inputmode="decimal" placeholder="0.00 €" style="height:70px !important; font-weight:700;">
        <textarea id="descripcion" maxlength="200" placeholder="Nota..." style="min-height:100px;"></textarea>
        <button onclick="guardar()" style="background:var(--gold-gradient); color:#000; height:70px; width:100%; font-size:22px; margin-top:10px; border:none; font-weight:bold; border-radius:16px;">GUARDAR</button>
        <div id="btnEliminarRegistro" class="hidden"><button onclick="eliminarRegistroActual()" style="background:var(--danger); color:white; height:60px; width:100%; font-size:18px; margin-top:10px; border:none; font-weight:bold; border-radius:16px;">ELIMINAR</button></div>
        <button onclick="volver()" style="background:transparent; color:#94a3b8; width:100%; margin-top:15px; border:none; font-size: 16px;">CANCELAR</button>
    </div>
</div>
<script>
const subBase = ["Accesorios","Agua","Aita","Ajuar / Electrodomésticos","Alojamiento","Apuestas y juegos","Atracciones","Ayuntamiento","Barco","Cajero","Casa","Comida","Comisiones","Comunidad","Copas","Efectivo","Electrónica","Extraescolar","Farmacia","Filamento","Garaje","Gas","Gasolina","Herramientas","Ikastola","Impresora","Impuestos","Juguetes / Regalos","Libros / Material escolar","Luz","Mantenimiento","Medicamentos","Parking","Peaje","Préstamo","Reforma","Ropa","Septiembre","Seguro","Suscripción","Suscripciones","Teléfono","Tren","Varios"];
const catBase = ["Casa","Caravana","Coche","Compras","Efectivo","Escolar","Garaje","Restaurante","Vacaciones"], mesesLabel = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"], origenBase = ["Ingreso","Gasto","Nómina"];
let movimientos = JSON.parse(localStorage.getItem('movimientos')) || [], catExtra = JSON.parse(localStorage.getItem('categoriaExtra')) || [], subMaestra = JSON.parse(localStorage.getItem('subMaestra_v2')) || subBase, nBackup = parseInt(localStorage.getItem('nBackup')) || 1, registrosVisibles = 25, filtradosGlobal = [], pinActual = "";
const PIN_OK = "7143";

const pressPin = (n) => { if(pinActual.length < 4) { pinActual += n; updateDots(); if(pinActual === PIN_OK) unlock(); else if(pinActual.length === 4) { alert("PIN Incorrecto"); clearPin(); }}};
const clearPin = () => { pinActual = ""; updateDots(); };
const updateDots = () => document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('filled', i < pinActual.length));
const unlock = () => { document.getElementById("authOverlay").style.display = "none"; document.getElementById("movimientos").classList.remove("hidden"); init(); };
const biometricAuth = async () => { if(window.isSecureContext || window.location.protocol === 'file:') unlock(); else alert("Requiere HTTPS"); };
const generarID = () => `id_${Date.now()}_${Math.random().toString(36).substr(2, 5)}`;
const resetPagina = () => { registrosVisibles = 25; window.scrollTo(0,0); };
const sanificar = (t) => t ? t.trim().charAt(0).toUpperCase() + t.trim().slice(1).toLowerCase() : "";

const llenar = (id, base, extra, pre = "") => {
    const s = document.getElementById(id); s.innerHTML = `<option value="" disabled ${pre === "" ? 'selected' : ''}>Seleccionar ${id}...</option>`;
    [...new Set([...base, ...extra])].sort((a,b) => a.localeCompare(b, 'es')).forEach(v => {
        if ((id === "categoria" && ["Oskar","Josune"].includes(v)) || (id === "subcategoria" && mesesLabel.includes(v))) return;
        s.innerHTML += `<option value="${v}" ${v === pre ? 'selected' : ''}>${v}</option>`;
    });
    if (id !== "origen") s.innerHTML += `<option value="+">+ Añadir nuevo...</option>`;
};

const abrirFormulario = (id = null) => {
    const f = document.getElementById("form"), mDiv = document.getElementById("movimientos"), btnD = document.getElementById("btnEliminarRegistro");
    if(id) {
        let m = movimientos.find(x => x.id.toString() === id.toString());
        document.getElementById("editId").value = m.id; document.getElementById("fecha").value = m.f;
        llenar("origen", origenBase, [], m.o);
        if (["Oskar","Josune"].includes(m.c)) { llenar("categoria", catBase, catExtra); document.getElementById("categoria").innerHTML += `<option value="${m.c}" selected>${m.c}</option>`; }
        else llenar("categoria", catBase, catExtra, m.c);
        m.o === "Nómina" ? document.getElementById("subcategoria").innerHTML = `<option value="${m.s}" selected>${m.s}</option>` : llenar("subcategoria", subMaestra, [], m.s);
        document.getElementById("importe").value = Math.abs(m.imp); document.getElementById("descripcion").value = m.d || "";
        btnD.classList.remove("hidden");
    } else {
        ["editId","importe","descripcion"].forEach(i => document.getElementById(i).value = "");
        document.getElementById("fecha").value = new Date().toISOString().split("T")[0];
        llenar("origen", origenBase, []); llenar("categoria", catBase, catExtra); llenar("subcategoria", subMaestra, []);
        btnD.classList.add("hidden");
    }
    f.classList.remove("hidden"); mDiv.classList.add("hidden");
};

const guardar = () => {
    const ids = ["editId","origen","categoria","subcategoria","fecha","descripcion","importe"];
    const v = ids.reduce((acc, id) => ({...acc, [id]: document.getElementById(id).value}), {});
    const imp = parseFloat(v.importe); if(!v.origen || !v.categoria || isNaN(imp)) return alert("Faltan datos");
    const m = { id: v.editId || generarID(), f: v.fecha, o: v.origen, c: v.categoria, s: v.subcategoria, imp: v.origen === "Gasto" ? -Math.abs(imp) : Math.abs(imp), d: v.descripcion };
    if(v.editId) { const idx = movimientos.findIndex(x => x.id.toString() === v.editId.toString()); if(idx !== -1) movimientos[idx] = m; }
    else { movimientos.push(m); if (movimientos.length % 15 === 0) ejecutarBackupRotativo(); }
    localStorage.setItem('movimientos', JSON.stringify(movimientos)); volver();
};

const mostrar = () => {
    const fs = ["filtroMes","filtroAño","filtroCat","filtroSub","filtroOri"].map(id => document.getElementById(id).value);
    let t = 0;
    filtradosGlobal = movimientos.filter(m => {
        const d = m.f.split("-");
        const cM = fs[0] === "TODOS" || (parseInt(d[1])-1).toString() === fs[0];
        const cA = fs[1] === "TODOS" || d[0] === fs[1];
        const cC = fs[2] === "TODAS" || m.c === fs[2];
        const cS = fs[3] === "TODAS" || m.s === fs[3];
        const cO = fs[4] === "TODOS" || m.o === fs[4];
        return cM && cA && cC && cS && cO;
    }).sort((a,b) => new Date(b.f) - new Date(a.f));
    filtradosGlobal.forEach(m => t += m.imp);
    document.getElementById("lista").innerHTML = filtradosGlobal.slice(0, registrosVisibles).map(m => `
        <div class='card' onclick="abrirFormulario('${m.id}')" style="border-left-color: ${m.imp >= 0 ? 'var(--success)' : 'var(--danger)'}">
            <div class="meta">${m.f.split("-").reverse().join("/")} • ${m.o}</div><b>${m.c} - ${m.s}</b>${m.d ? `<div style="font-size:12px;opacity:0.8">${m.d}</div>` : ''}
            <div class="monto" style="color: ${m.imp >= 0 ? 'var(--success)' : 'var(--danger)'}">${m.imp.toFixed(2)} €</div>
        </div>`).join("");
    document.getElementById("loader").style.display = "none";
    const bD = document.getElementById("balance"); bD.innerText = t.toFixed(2) + " €";
    bD.style.color = t < 0 ? "var(--danger)" : (t <= 750 ? "var(--warning)" : (t <= 1400 ? "var(--success)" : "var(--electric-blue)"));
};
const manejarNuevo = (el, t) => { if (el.value === "+") { 
    let n = prompt(`Nueva ${t}:`); if(n) {
        let s = sanificar(n); t === "categoria" ? catExtra.push(s) : subMaestra.push(s);
        localStorage.setItem(t === "categoria" ? 'categoriaExtra' : 'subMaestra_v2', JSON.stringify(t === "categoria" ? catExtra : subMaestra));
        llenar(t, (t === "categoria" ? catBase : subMaestra), (t === "categoria" ? catExtra : []), s); actualizarListas();
    } el.selectedIndex = 0;
}};

const importarCSV = (e) => {
    const reader = new FileReader(); reader.onload = (evt) => {
        try {
            const lines = evt.target.result.split(/\r?\n/).filter(l => l.includes(";")), cab = lines[0].toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").split(";").map(h => h.trim());
            const idx = {f: cab.indexOf("fecha"), o: cab.indexOf("origen"), c: cab.indexOf("categoria"), s: cab.indexOf("subcategoria"), i: cab.indexOf("importe"), d: cab.indexOf("descripcion")};
            lines.slice(1).forEach(l => {
                let col = l.split(";"); if (col.length < 2) return;
                let fS = col[idx.f].trim().split("/"), fISO = `${fS[2]}-${fS[1].padStart(2,'0')}-${fS[0].padStart(2,'0')}`;
                let imp = parseFloat(col[idx.i].replace(/[^\d,.-]/g, '').replace(',', '.')), cL = sanificar(col[idx.c]), sL = sanificar(col[idx.s]);
                if (!isNaN(imp)) {
                    movimientos.push({ id: generarID(), f: fISO, o: col[idx.o].trim(), c: cL, s: sL, imp, d: col[idx.d].trim() });
                    if (![...catBase, ...catExtra].includes(cL)) catExtra.push(cL); if (!subMaestra.includes(sL)) subMaestra.push(sL);
                }
            });
            localStorage.setItem('categoriaExtra', JSON.stringify(catExtra)); localStorage.setItem('subMaestra_v2', JSON.stringify(subMaestra));
            localStorage.setItem('movimientos', JSON.stringify(movimientos)); location.reload();
        } catch (err) { alert("Error en CSV"); }
    }; reader.readAsText(e.target.files[0], "UTF-8");
};

const ejecutarBackupRotativo = () => {
    let csv = "\uFEFFFecha;Origen;Categoria;Subcategoria;Importe;Descripcion\n";
    movimientos.forEach(m => csv += `${m.f.split("-").reverse().join("/")};${m.o};${m.c};${m.s};${m.imp.toFixed(2).replace('.',',')};"${(m.d || '').replace(/;/g,',')}"\n`);
    let a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' })); a.download = `BACKUP_APK_${nBackup}.csv`; a.click();
    nBackup = nBackup >= 5 ? 1 : nBackup + 1; localStorage.setItem('nBackup', nBackup);
};

const exportarCSV = () => {
    let csv = "\uFEFFFecha;Origen;Categoria;Subcategoria;Importe;Descripcion\n";
    movimientos.forEach(m => csv += `${m.f.split("-").reverse().join("/")};${m.o};${m.c};${m.s};${m.imp.toFixed(2).replace('.',',')};"${(m.d || '').replace(/;/g,',')}"\n`);
    let a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' })); a.download = `Gastos_V061_${new Date().toISOString().slice(0,10)}.csv`; a.click();
};

const eliminarRegistroActual = () => confirm("¿Borrar?") && (movimientos = movimientos.filter(m => m.id.toString() !== document.getElementById("editId").value), localStorage.setItem('movimientos', JSON.stringify(movimientos)), volver());
const volver = () => { document.getElementById("form").classList.add("hidden"); document.getElementById("movimientos").classList.remove("hidden"); actualizarListas(); mostrar(); };

const actualizarListas = () => {
    const fC = document.getElementById("filtroCat"), fS = document.getElementById("filtroSub"), fO = document.getElementById("filtroOri");
    fC.innerHTML = '<option value="TODAS">Cat: TODAS</option>'; [...new Set([...catBase, ...catExtra])].sort().forEach(c => !["Oskar","Josune"].includes(c) && fC.add(new Option(c, c)));
    fS.innerHTML = '<option value="TODAS">Sub: TODAS</option>'; [...new Set(subMaestra)].sort().forEach(s => !mesesLabel.includes(s) && fS.add(new Option(s, s)));
    fO.innerHTML = '<option value="TODOS">Ori: TODOS</option>'; origenBase.forEach(o => fO.add(new Option(o, o)));
};

const borrarElemento = (id) => {
    let v = document.getElementById(id).value; if(!v || v === "+") return;
    if(confirm(`¿Eliminar "${v}"?`)) { id === 'categoria' ? catExtra = catExtra.filter(i => i !== v) : subMaestra = subMaestra.filter(i => i !== v);
        localStorage.setItem(id === 'categoria' ? 'categoriaExtra' : 'subMaestra_v2', JSON.stringify(id === 'categoria' ? catExtra : subMaestra)); location.reload();
    }
};

const crearPopupNomina = () => {
    let p = document.createElement("div"); p.className = "popup-overlay"; p.id = "popupNomina";
    p.innerHTML = `<div class="popup-content" style="background:#0b0f1a; border:3px solid var(--primary);"><h3 style="color:var(--primary); margin-bottom:25px;">¿QUIÉN COBRA?</h3><button class="btn-metal" onclick="asignarNomina('Oskar')" style="background:var(--gold-metal); color:#2a2105;">OSKAR</button><button class="btn-metal" onclick="asignarNomina('Josune')" style="background:var(--pink-metal); color:#fff;">JOSUNE</button><button onclick="document.getElementById('popupNomina').remove()" style="background:transparent;color:#94a3b8;border:none;margin-top:10px;">CANCELAR</button></div>`;
    document.body.appendChild(p);
};
const asignarNomina = (n) => { document.getElementById("categoria").innerHTML = `<option value="${n}" selected>${n}</option>`; document.getElementById("popupNomina").remove(); };
const resetTotal = () => confirm("¿BORRAR TODO?") && confirm("¿Seguro?") && (localStorage.clear(), location.reload());

document.getElementById("origen").onchange = function() { 
    if(this.value === "Nómina") { 
        let fVal = document.getElementById("fecha").value;
        let m = new Date(fVal + "T00:00:00").getMonth(); 
        document.getElementById("subcategoria").innerHTML = `<option value="${mesesLabel[m]}" selected>${mesesLabel[m]}</option>`; 
        crearPopupNomina(); 
    } 
};
document.getElementById("categoria").onchange = function() { manejarNuevo(this, "categoria"); };
document.getElementById("subcategoria").onchange = function() { manejarNuevo(this, "subcategoria"); };

const init = () => {
    const fM = document.getElementById("filtroMes"), fA = document.getElementById("filtroAño"), hoy = new Date();
    fM.innerHTML = '<option value="TODOS">Mes: TODOS</option>'; mesesLabel.forEach((m, i) => fM.add(new Option(m, i))); fM.value = hoy.getMonth();
    fA.innerHTML = '<option value="TODOS">Año: TODOS</option>'; for(let a=2020; a<=2030; a++) fA.add(new Option(a, a)); fA.value = hoy.getFullYear();
    actualizarListas(); document.getElementById("tagBackup").innerText = "PRÓX: #" + nBackup; mostrar();
};
window.onscroll = () => { if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 200 && registrosVisibles < filtradosGlobal.length) { document.getElementById("loader").style.display = "block"; setTimeout(() => { registrosVisibles += 25; mostrar(); }, 200); }};
</script>
</body>
